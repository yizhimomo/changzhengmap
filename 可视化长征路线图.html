<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: "Microsoft YaHei", "PingFang SC", sans-serif; background: #f5f1eb; color: #2c2c2c; min-height: 100vh; display: flex; flex-direction: column; }

header { background: linear-gradient(135deg, #8b1a1a, #c0392b); color: #fff; text-align: center; padding: 24px 20px 20px; box-shadow: 0 2px 12px rgba(0,0,0,0.15); }
header h1 { font-size: 32px; letter-spacing: 8px; font-weight: 700; }
header p { font-size: 14px; opacity: .8; margin-top: 6px; letter-spacing: 2px; }

main { flex: 1; display: flex; gap: 20px; padding: 20px; max-width: 1400px; margin: 0 auto; width: 100%; }
.map-section { flex: 7; background: #fff; border-radius: 12px; box-shadow: 0 2px 12px rgba(0,0,0,.08); overflow: hidden; display: flex; align-items: center; justify-content: center; padding: 12px; min-height: 600px; }
.map-section svg { width: 100%; height: auto; max-height: 78vh; display: block; }

.sidebar { flex: 3; background: #fff; border-radius: 12px; box-shadow: 0 2px 12px rgba(0,0,0,.08); padding: 20px; overflow-y: auto; max-height: 82vh; min-width: 260px; }

.sidebar .placeholder .icon { font-size: 48px; margin-bottom: 12px; opacity: .4; }
.sidebar .placeholder p { font-size: 14px; line-height: 1.8; }
.sidebar .content h2 { color: #8b1a1a; font-size: 22px; margin-bottom: 4px; border-bottom: 2px solid #e8e0d6; padding-bottom: 10px; }
.sidebar .content .meta { font-size: 13px; color: #888; margin-bottom: 14px; }
.sidebar .content .meta span { margin-right: 16px; }
.sidebar .content .section { margin-bottom: 16px; }
.sidebar .content .section h3 { font-size: 15px; color: #8b1a1a; margin-bottom: 6px; display: flex; align-items: center; gap: 6px; }
.sidebar .content .section h3::before { content: ''; display: inline-block; width: 4px; height: 16px; background: #c0392b; border-radius: 2px; }
.sidebar .content .section p { font-size: 14px; line-height: 1.8; color: #444; }
.sidebar .content .section blockquote { background: #f9f6f0; border-left: 3px solid #c0392b; padding: 10px 14px; margin: 8px 0; border-radius: 0 6px 6px 0; font-size: 13px; line-height: 1.8; color: #555; font-style: italic; }
.sidebar .content .section blockquote cite { display: block; text-align: right; font-size: 12px; color: #888; margin-top: 4px; font-style: normal; }

footer { background: #2c2c2c; color: #aaa; text-align: center; padding: 14px 20px; font-size: 13px; letter-spacing: 1px; }

.marker { cursor: pointer; transition: transform .2s, filter .2s; }
.marker:hover { filter: brightness(1.2); }
.marker:hover .marker-dot { stroke-width: 3; }
.marker.active .marker-dot { fill: #f1c40f; stroke: #e67e22; stroke-width: 3; }
.marker.active .marker-label { font-weight: bold; fill: #c0392b; }
.route-line { fill: none; stroke: #c0392b; stroke-width: 2.5; stroke-dasharray: 6,4; opacity: .7; }

.legend { font-size: 12px; fill: #666; }
.legend-rect { fill: #c0392b; opacity: .7; }
@media (max-width: 860px) { main { flex-direction: column; } .sidebar { max-height: none; } }
</style>

const placeholder = document.getElementById('placeholder');
const content = document.getElementById('content');
const markers = document.querySelectorAll('.marker');

markers.forEach(m => {
  m.addEventListener('click', () => {
    markers.forEach(x => x.classList.remove('active'));
    m.classList.add('active');
    const id = m.dataset.id;
    const d = data[id];
    if (!d) return;
    placeholder.style.display = 'none';
    content.style.display = 'block';
    let html = `<h2>${d.name}</h2><div class="meta"><span>📅 ${d.date}</span><span>🏷️ ${d.type}</span></div>`;
    html += `<div class="section"><h3>概述</h3><p>${d.description}</p></div>`;
    if (d.events && d.events.length) {
      html += `<div class="section"><h3>历史事件</h3>`;
      d.events.forEach(e => {
        html += `<p><strong>${e.title}：</strong>${e.detail}</p>`;
      });
      html += `</div>`;
    }
    if (d.quotes && d.quotes.length) {
      html += `<div class="section"><h3>历史记载</h3>`;
      d.quotes.forEach(q => {
        html += `<blockquote>${q.text}<cite>${q.source}</cite></blockquote>`;
      });
      html += `</div>`;
    }
    content.innerHTML = html;
  });
});
